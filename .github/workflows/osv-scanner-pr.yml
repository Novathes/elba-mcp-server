name: OSV Scanner — PR

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

jobs:
  scan-pr:
    name: Vulnerability Scan (PR)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      scan-args: |-
        --recursive
        ./
