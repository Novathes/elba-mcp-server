name: OSV Scanner — PR

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

jobs:
  scan-pr:
    name: Vulnerability Scan (PR)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      scan-args: |-
        --recursive
        ./
