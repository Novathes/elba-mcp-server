name: 🐛 Bug Report
description: Report a bug with the Elba MCP Server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - VS Code
        - Windsurf
        - Other
    validations:
      required: true

  - type: textarea
    id: mcp-config
    attributes:
      label: MCP Config
      description: >
        Paste the relevant section of your MCP client configuration.
        **Please redact your integration token!**
      render: json

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Run `node --version` and paste the output."
      placeholder: "v20.x.x"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
